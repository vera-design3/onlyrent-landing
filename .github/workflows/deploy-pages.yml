name: Deploy preview (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 中文版放根目錄、英文版放 /en/（GitHub Pages 專案站路徑為 /onlyrent-landing/）
      - name: Build 中文版
        run: npx vite build --mode zh --base=/onlyrent-landing/ --outDir _site
      - name: Build 英文版
        run: npx vite build --mode en --base=/onlyrent-landing/en/ --outDir _site/en
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
